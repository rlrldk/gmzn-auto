name: GAMEZONE 자동 출석

on:
  schedule:
    - cron: "10 15 * * *"   # 매일 KST 00:10 에 1회
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  attend:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 출석 실행
        env:
          GAMEZONE_ID: ${{ secrets.GAMEZONE_ID }}
          GAMEZONE_PW: ${{ secrets.GAMEZONE_PW }}
        run: python attend.py

      - name: Keep-alive 커밋
        if: always()
        run: |
          echo "Last run (UTC): $(date -u)" > keep_alive.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add keep_alive.txt
          git diff --cached --quiet || git commit -m "keep-alive: $(date -u +%Y-%m-%d)"
          git push
