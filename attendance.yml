name: GAMEZONE 자동 출석

on:
  schedule:
    # GitHub Actions cron 은 UTC 기준이다. (KST = UTC + 9)
    # 아래는 매일 KST 00:10 / 09:10 두 번 시도 (스케줄 지연/누락 대비)
    - cron: "10 15 * * *"   # 15:10 UTC = 00:10 KST
    - cron: "10 0 * * *"    # 00:10 UTC = 09:10 KST
  workflow_dispatch: {}      # 수동 실행 버튼

jobs:
  attend:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 출석 실행
        env:
          GAMEZONE_ID: ${{ secrets.GAMEZONE_ID }}
          GAMEZONE_PW: ${{ secrets.GAMEZONE_PW }}
        run: python attend.py
